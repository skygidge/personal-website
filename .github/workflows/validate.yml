name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # No dependencies to install — validation is pure Node.
      - name: Validate site
        run: npm test
      - name: Verify static build is committed (build output must be up to date)
        run: |
          node scripts/build.js
          git diff --exit-code -- '*.html' sitemap.xml \
            || (echo "::error::Built HTML/sitemap is stale — run 'npm run build' and commit." && exit 1)
